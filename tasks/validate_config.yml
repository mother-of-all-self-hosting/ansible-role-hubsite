---
- name: (Deprecation) Catch and report renamed Hubsite variables
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please rename the variable (`{{ item.old }}` -> `{{ item.new }}`) on your configuration file (vars.yml).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - {"old": "hubsite_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)"}

- name: Fail if required Hubsite settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - hubsite_title
    - hubsite_subtitle
    - hubsite_hostname
